<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course-Registration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body class="body">
    <div class="container">
        <div class="header">
            <div class="heading">
                <h3>COURSE REGISTRATION PORTAL</h3>
            </div>
        </div>
        <div class="main">
            <div class="form-container">
               <form method="post" action="http://localhost:8080/course-portal/admin" id="admin-form" class="form active-form">
                    <h2>Admin Login</h2>
                    <input type="password" name="adminPassword" placeholder="Enter Admin Password" required />
                    <button class="submit-button" type="submit">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/index.js"></script>
</body>
</html>
